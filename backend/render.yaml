services:
  - type: web
    name: paperchat-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You'll paste this manually in Render dashboard
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: TOP_K_RESULTS
        value: "4"
